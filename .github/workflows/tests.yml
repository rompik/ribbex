name: tests

on:
  push:
    branches:
    - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tox:
    strategy:
      matrix:
        include:
          - os: windows-2022
            python-version: "3.10"
            tox-env: py310
          - os: windows-2022
            python-version: "3.11"
            tox-env: py311
          - os: windows-2022
            python-version: "3.12"
            tox-env: py312
          - os: windows-2022
            python-version: "3.13"
            tox-env: py313
          - os: ubuntu-24.04
            python-version: "3.10"
            tox-env: py310
          - os: ubuntu-24.04
            python-version: "3.11"
            tox-env: py311
          - os: ubuntu-24.04
            python-version: "3.12"
            tox-env: py312
          - os: ubuntu-24.04
            python-version: "3.13"
            tox-env: py313
          - os: macos-13
            python-version: "3.10"
            tox-env: py310
          - os: macos-13
            python-version: "3.11"
            tox-env: py311
          - os: macos-13
            python-version: "3.12"
            tox-env: py312
          - os: macos-13
            python-version: "3.13"
            tox-env: py313
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v3
        with:
          python-version: ${{ matrix.python-version }}
          cache: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox tox-pdm coveralls
      - name: Install libegl on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt install libegl1 libglx-mesa0
      - name: Test with tox
        run: tox -e ${{ matrix.tox-env }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
