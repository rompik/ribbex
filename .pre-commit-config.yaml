repos:

- repo: https://github.com/psf/black
  rev: 25.1.0
  hooks:
    - id: black
      args:
        - --line-length=120
        - --include='(open_pyqt_ribbon/.*\.py|tests/.*\.py|docs/source/conf\.py)'

- repo: https://github.com/pycqa/isort
  rev: 6.0.1
  hooks:
    - id: isort
      args:
        - --profile=black
